- service: "playback-service"
  namespace: "streamflix-prod"
  cluster: "streamflix-us-east-1"
  workload:
    kind: "Deployment"
    name: "playback-api"
    replicas: 12
    image: "registry.streamflix.local/playback-api:2026.06.17"
  resources:
    requests: {cpu: "500m", memory: "512Mi"}
    limits: {cpu: "2000m", memory: "1024Mi"}
  storage:
    pvc: "playback-cache-pvc"
    class: "gp3"
    iops: "3000"
  kv:
    env: "prod"
    tier: "edge-api"
    owner: "streaming-platform"
    pager: "playback-primary"
  failure_modes:
    oom_kill:
      enabled: false
      symptom: "OOMKilled"
      trigger: {memory_working_set: "1180Mi", restart_count_delta: 4}
    pod_restart:
      enabled: false
      symptom: "CrashLoopBackOff"
      trigger: {restart_count_delta: 9, exit_code: 137}
    disk_iops:
      enabled: false
      symptom: "DiskIOPSSaturation"
      trigger: {read_iops: 9500, write_iops: 8700, pvc_latency_ms: 420}
    cpu_throttle:
      enabled: false
      symptom: "CPUThrottlingHigh"
      trigger: {cpu_throttled_ratio: 0.72, p99_latency_ms: 3800}
    memory_leak:
      enabled: false
      symptom: "MemoryPressure"
      trigger: {rss_growth_mb_per_min: 144, heap_allocated: "1340Mi", gc_pause_ms: 980}
    node_pressure:
      enabled: false
      symptom: "NodePressure"
      trigger: {node_memory_available_pct: 3, node_disk_available_pct: 6, evicted_pods: 5}
    image_pull_backoff:
      enabled: false
      symptom: "ImagePullBackOff"
      trigger: {image_pull_failures: 12, registry_status: "429 Too Many Requests", bad_image_tag: "2026.06.17-hotfix"}
    hpa_maxed:
      enabled: false
      symptom: "HPAMaxedOut"
      trigger: {desired_replicas: 32, max_replicas: 18, cpu_utilization_pct: 94, queue_depth: 4200}
    config_regression:
      enabled: false
      symptom: "ConfigRegression"
      trigger: {config_key: "manifest.cache_ttl_seconds", previous: 120, current: 0, error_rate_pct: 18.4}
    dependency_timeout:
      enabled: false
      symptom: "DependencyTimeout"
      trigger: {dependency: "manifest-service", timeout_ms: 2500, timeout_rate_pct: 22.7}
    ingress_5xx:
      enabled: false
      symptom: "Ingress5xxSpike"
      trigger: {ingress_5xx_rate_pct: 12.2, upstream_reset_count: 1840, region: "us-east-1"}
    network_packet_loss:
      enabled: false
      symptom: "NetworkPacketLoss"
      trigger: {packet_loss_pct: 8.5, retransmits_per_second: 1200, affected_az: "use1-az2"}
