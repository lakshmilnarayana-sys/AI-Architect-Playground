- service: "playback-service"
  namespace: "streamflix-prod"
  cluster: "streamflix-us-east-1"
  workload:
    kind: "Deployment"
    name: "playback-api"
    replicas: 12
    image: "registry.streamflix.local/playback-api:2026.06.17"
  resources:
    requests: {cpu: "500m", memory: "512Mi"}
    limits: {cpu: "2000m", memory: "1024Mi"}
  storage:
    pvc: "playback-cache-pvc"
    class: "gp3"
    iops: "3000"
  kv:
    env: "prod"
    tier: "edge-api"
    owner: "streaming-platform"
    pager: "playback-primary"
  failure_modes:
    oom_kill:
      enabled: false
      symptom: "OOMKilled"
      trigger: {memory_working_set: "1180Mi", restart_count_delta: 4}
    pod_restart:
      enabled: false
      symptom: "CrashLoopBackOff"
      trigger: {restart_count_delta: 9, exit_code: 137}
    disk_iops:
      enabled: false
      symptom: "DiskIOPSSaturation"
      trigger: {read_iops: 9500, write_iops: 8700, pvc_latency_ms: 420}
    cpu_throttle:
      enabled: false
      symptom: "CPUThrottlingHigh"
      trigger: {cpu_throttled_ratio: 0.72, p99_latency_ms: 3800}
