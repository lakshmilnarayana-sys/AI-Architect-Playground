- id: "runbook:playback-latency"
  type: "Runbook"
  name: "Playback Latency Runbook"
  description: "Production procedure for playback API latency, CDN failover, manifest degradation, and Kubernetes resource saturation."
  customer_impact: "Customers see slow video start, buffering, and elevated playback errors across affected regions."
  observability_checks:
    - "Grafana: Playback Golden Signals dashboard, p95/p99 start latency, error rate, and CDN failover panels."
    - "Prometheus: rate(container_cpu_cfs_throttled_seconds_total[5m]) and container_memory_working_set_bytes for playback-api."
    - "OpenSearch: search playback-api logs by incident_id, pod, namespace, and request_id."
    - "Tempo: inspect traces for manifest lookup, entitlement check, and CDN token generation spans."
  rollback_criteria:
    - "Rollback playback-api if p99 start latency stays above 2500 ms for 10 minutes after mitigation."
    - "Rollback CDN routing config if cache-hit ratio drops below 80% after traffic shift."
    - "Abort rollout if canary restart count increases by more than 2 within 5 minutes."
  escalation_notes:
    - "Page playback primary on-call and streaming platform incident commander for SEV1."
    - "Notify support lead if customer impact exceeds one region or more than 5% of playback starts."
  steps:
    - id: "playback-1"
      description: "Confirm playback-api pod health and detect OOMKilled or CrashLoopBackOff symptoms."
      command: "kubectl -n streamflix-prod get pods -l app=playback-api -o wide"
    - id: "playback-2"
      description: "Inspect recent pod restarts and container termination reasons."
      command: "kubectl -n streamflix-prod describe deploy/playback-api"
    - id: "playback-3"
      description: "Check CDN routing and manifest-service dependency latency before changing traffic."
      command: "kubectl -n streamflix-prod logs deploy/playback-api --since=15m | grep -E 'manifest|CDN|latency'"
    - id: "playback-4"
      description: "Scale playback-api or raise memory/CPU limits for resource saturation."
      command: "kubectl -n streamflix-prod scale deploy/playback-api --replicas=18"
    - id: "playback-5"
      description: "Fail over CDN routing for the affected region if manifest responses remain healthy but CDN token generation is slow."
      command: "kubectl -n streamflix-prod annotate deploy/cdn-router streamflix.io/failover=secondary --overwrite"
    - id: "playback-6"
      description: "Verify recovery with playback start latency, manifest error rate, and customer session success."
      command: "kubectl -n streamflix-prod rollout status deploy/playback-api"
- id: "runbook:billing-incident"
  type: "Runbook"
  name: "Billing Incident Runbook"
  description: "Production procedure for duplicate payment capture, ledger reconciliation drift, and payment gateway dependency incidents."
  customer_impact: "Customers may see duplicate charges, failed checkout, or delayed subscription activation."
  observability_checks:
    - "Grafana: Billing Transactions dashboard, duplicate capture count, auth/capture ratio, and ledger lag."
    - "OpenSearch: search billing-worker and payment-gateway logs by transaction_id and ledger_batch_id."
    - "Prometheus: billing_capture_total, billing_duplicate_capture_total, and reconciliation_lag_seconds."
  rollback_criteria:
    - "Disable capture worker if duplicate capture rate remains above 0.1% for two consecutive batches."
    - "Rollback payment gateway adapter if auth succeeds but capture idempotency check fails."
  escalation_notes:
    - "Page revenue systems on-call and notify finance operations for SEV2 or higher."
    - "Create support macro for affected users before public status update."
  steps:
    - id: "billing-1"
      description: "Freeze capture retries for suspected duplicate batch."
      command: "kubectl -n streamflix-prod scale deploy/billing-capture-worker --replicas=0"
    - id: "billing-2"
      description: "Inspect idempotency key collision logs."
      command: "kubectl -n streamflix-prod logs deploy/billing-service --since=30m | grep idempotency"
    - id: "billing-3"
      description: "Compare ledger reconciliation lag against SLO."
      command: "kubectl -n streamflix-prod exec deploy/billing-service -- ./bin/check-ledger-lag"
    - id: "billing-4"
      description: "Replay safe reconciliation dry-run for affected transaction IDs."
      command: "kubectl -n streamflix-prod exec deploy/billing-service -- ./bin/reconcile --dry-run"
    - id: "billing-5"
      description: "Resume workers after duplicate count remains flat."
      command: "kubectl -n streamflix-prod scale deploy/billing-capture-worker --replicas=6"
- id: "runbook:identity-lockout"
  type: "Runbook"
  name: "Identity Lockout Runbook"
  description: "Production procedure for admin lockouts, MFA provider degradation, and privileged access recovery."
  customer_impact: "Internal administrators may be unable to access control-plane tools; customer login can degrade if provider outage spreads."
  observability_checks:
    - "Grafana: Identity Auth dashboard, MFA challenge latency, lockout count, and provider error rate."
    - "OpenSearch: identity-service logs for mfa_provider, lockout_reason, and admin_user_id."
    - "Audit evidence dashboard: privileged access override events."
  rollback_criteria:
    - "Rollback MFA provider config if admin lockouts continue after emergency bypass expires."
    - "Disable new MFA policy only after security lead approval."
  escalation_notes:
    - "Page identity on-call, security incident commander, and compliance duty officer for SEV1."
  steps:
    - id: "identity-1"
      description: "Verify identity-service pod and MFA provider health."
      command: "kubectl -n streamflix-prod get pods -l app=identity-service"
    - id: "identity-2"
      description: "Search lockout reason logs for admin accounts."
      command: "kubectl -n streamflix-prod logs deploy/identity-service --since=20m | grep lockout_reason"
    - id: "identity-3"
      description: "Enable emergency break-glass path for approved admins."
      command: "kubectl -n streamflix-prod annotate deploy/identity-service streamflix.io/break-glass=enabled --overwrite"
    - id: "identity-4"
      description: "Verify audit events are written for every override."
      command: "kubectl -n streamflix-prod logs deploy/audit-evidence-service --since=20m | grep break-glass"
    - id: "identity-5"
      description: "Disable break-glass after MFA provider recovery."
      command: "kubectl -n streamflix-prod annotate deploy/identity-service streamflix.io/break-glass=disabled --overwrite"
- id: "runbook:recommendation-staleness"
  type: "Runbook"
  name: "Recommendation Staleness Runbook"
  description: "Production procedure for stale recommendations, feature-store freshness gaps, and ranking model lag."
  customer_impact: "Customers receive outdated recommendations, lowering engagement and personalization quality."
  observability_checks:
    - "Grafana: Recommendation Freshness dashboard, feature age, model serving latency, and stale result rate."
    - "OpenSearch: recommendation-service logs by feature_set_version and model_version."
    - "Prometheus: feature_store_freshness_seconds and ranking_request_latency_seconds."
  rollback_criteria:
    - "Rollback model version if stale result rate remains above 2% after feature refresh."
    - "Disable personalized rail if feature freshness exceeds 30 minutes for two regions."
  escalation_notes:
    - "Page personalization on-call and data platform on-call when feature freshness is the leading signal."
  steps:
    - id: "reco-1"
      description: "Check recommendation and feature-store pods."
      command: "kubectl -n streamflix-prod get pods -l 'app in (recommendation-service,feature-store-service)'"
    - id: "reco-2"
      description: "Inspect feature freshness lag."
      command: "kubectl -n streamflix-prod logs deploy/feature-store-service --since=30m | grep freshness"
    - id: "reco-3"
      description: "Force safe refresh of the affected feature set."
      command: "kubectl -n streamflix-prod exec deploy/feature-store-service -- ./bin/refresh-feature-set --safe"
    - id: "reco-4"
      description: "Shift recommendation traffic to previous model if staleness persists."
      command: "kubectl -n streamflix-prod annotate deploy/recommendation-service streamflix.io/model=previous --overwrite"
    - id: "reco-5"
      description: "Verify stale result rate returns under threshold."
      command: "kubectl -n streamflix-prod rollout status deploy/recommendation-service"
- id: "runbook:observability-degradation"
  type: "Runbook"
  name: "Observability Degradation Runbook"
  description: "Production procedure for telemetry gaps, dashboard outages, alert routing failure, and collector backpressure."
  customer_impact: "Responders lose visibility into production health; customer impact may be indirect but MTTR increases."
  observability_checks:
    - "Grafana: Observability Pipeline dashboard, collector queue depth, ingest errors, and alert delivery latency."
    - "OpenSearch: fluent-bit and collector logs by namespace and output plugin."
    - "Prometheus: otelcol_exporter_send_failed_spans and alertmanager_notifications_failed_total."
  rollback_criteria:
    - "Rollback collector config if ingest error rate rises after sampling change."
    - "Fail over alert routing if notification latency exceeds 120 seconds for 5 minutes."
  escalation_notes:
    - "Page platform operations on-call and notify all active incident commanders."
  steps:
    - id: "obs-1"
      description: "Check collector and alertmanager pods."
      command: "kubectl -n observability get pods -l 'app in (otel-collector,alertmanager)'"
    - id: "obs-2"
      description: "Inspect collector exporter failures."
      command: "kubectl -n observability logs deploy/otel-collector --since=15m | grep exporter"
    - id: "obs-3"
      description: "Reduce debug log ingest if OpenSearch is backpressured."
      command: "kubectl -n observability annotate deploy/fluent-bit streamflix.io/drop-debug=true --overwrite"
    - id: "obs-4"
      description: "Fail over alert notifications to backup route."
      command: "kubectl -n observability annotate deploy/alertmanager streamflix.io/route=backup --overwrite"
    - id: "obs-5"
      description: "Verify telemetry and alert delivery recovery."
      command: "kubectl -n observability rollout status deploy/otel-collector"
