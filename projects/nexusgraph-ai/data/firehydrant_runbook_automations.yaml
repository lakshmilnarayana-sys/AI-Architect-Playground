- id: "fh:auto:sev1-streaming"
  name: "SEV1 Streaming Incident Automation"
  trigger:
    severity: "SEV1"
    services: ["playback-service", "Playback Service", "manifest-service", "cdn-routing-service"]
  actions:
    - "create_incident_channel"
    - "create_tracking_ticket"
    - "assign_roles"
    - "start_video_bridge"
    - "post_status_update"
    - "notify_stakeholders"
    - "capture_timeline"
    - "assign_tasks"
    - "escalate_by_severity"
    - "generate_retro_summary"
  role_assignments:
    commander: "on-call incident commander"
    communications: "support lead"
    engineering: "service owner"
    executive: "duty executive"
  simulated_outputs:
    channel: "#inc-playback-api-sev1"
    ticket_prefix: "INC"
    status_template: "We are investigating elevated playback start latency affecting a subset of Streamflix users."
