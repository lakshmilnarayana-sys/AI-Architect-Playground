app:
  title: StreamFlix Software Catalog
  baseUrl: http://localhost:7007
organization:
  name: StreamFlix
backend:
  baseUrl: http://localhost:7007
  listen:
    host: 0.0.0.0
    port: 7007
  cors:
    origin: http://localhost:7007
  database:
    client: better-sqlite3
    connection: ':memory:'
auth:
  providers:
    guest: {}
catalog:
  rules:
    - allow: [Component, System, Group, User, Resource, Location, Domain, API]
  locations:
    - type: file
      target: /catalog/catalog.yaml
