services:
  neo4j:
    image: neo4j:5.26-community
    container_name: nexusgraph-ai-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/nexusgraph-local
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - ./graph:/import
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p nexusgraph-local 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  app:
    build: .
    container_name: nexusgraph-ai-app
    depends_on:
      neo4j:
        condition: service_healthy
    env_file:
      - .env.example
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    command: ["streamlit", "run", "app/streamlit_app.py", "--server.address=0.0.0.0", "--server.port=8501"]

volumes:
  neo4j_data:
