services:
  neo4j:
    image: neo4j:5.26-community
    container_name: nexusgraph-ai-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/nexusgraph-local
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - ./graph:/import
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p nexusgraph-local 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  app:
    build: .
    container_name: nexusgraph-ai-app
    depends_on:
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - OLLAMA_BASE_URL=http://ollama:11434
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    command: ["streamlit", "run", "app/streamlit_app.py", "--server.address=0.0.0.0", "--server.port=8501"]

  ollama:
    image: ollama/ollama:latest
    container_name: nexusgraph-ai-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment the following lines if you have a GPU and want to use it
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  neo4j_data:
  ollama_data:
