service_name: sample-payments-api
runtime: python
target_url: http://localhost:8080
openapi_path: ./examples/sample-payments-api/openapi.yaml
slo:
  p95_latency_ms: 500
  error_rate_percent: 1
test:
  duration: 10s
  engine: k6
  mode: standard
protocols:
  grpc:
    proto_path: ./examples/demo-apps/grpc-payments-api/protos/payments.proto
    auto_compile: true
    service_full_name: payments.Payments
    method: CreatePayment
    request:
      customer_id: cust_grpc_1001
      amount: 49.99
      currency: GBP
  websocket:
    message_schema:
      type: object
      required: [type, customerId, amount, currency]
      properties:
        type:
          type: string
          const: authorizePayment
        customerId:
          type: string
          pattern: "^cust_"
        amount:
          type: number
          minimum: 1
        currency:
          type: string
          enum: [GBP, USD]
    expected_response:
      json_field: status
    scenarios:
      - name: authorize-payment
        sequence:
          - think_time_ms: 100
  ui:
    journeys:
      - name: checkout
        path: /
        web_vitals: true
        screenshot_on_error: true
        trace: true
        video: true
        steps:
          - action: goto
            path: /
          - action: wait_for_selector
            selector: body
          - action: click
            selector: button
    concurrency: 1
distributed:
  enabled: false
  workers: 2
  compose_service: perfagent
  backend: docker-compose
  compose_file: docker-compose.yml
  project_name: perfagent-local
  kubernetes:
    namespace: perfagent
    image: ghcr.io/example/perfagent:ci
    artifact_pvc: perfagent-artifacts
    retry_limit: 2
service:
  cpu_allocation: 500m
  memory_allocation: 512Mi
  disk_allocation: 2Gi
  image_tag: sample-payments-api:local
llm:
  enabled: false
  provider: ollama
  model: llama3.2
  base_url: http://localhost:11434
traffic_profile:
  enabled: false
  source: prometheus
  lookback: 6h
  peak_multiplier: 1.5
  endpoint_label: route
  request_rate_query: 'sum by (route) (rate(http_requests_total{service="{service}"}[5m]))'
prometheus:
  enabled: false
  url: http://localhost:9090
  service_label: sample-payments-api
  query_config: ./examples/prometheus-queries.yaml
observability:
  provider: prometheus
  datadog:
    site: datadoghq.com
    api_key_env: DATADOG_API_KEY
    app_key_env: DATADOG_APP_KEY
  newrelic:
    account_id_env: NEW_RELIC_ACCOUNT_ID
    api_key_env: NEW_RELIC_API_KEY
  elasticsearch:
    url: http://localhost:9200
    api_key_env: ELASTICSEARCH_API_KEY
    index: traces-apm-*
    dependency_mappings:
      postgres:
        duration_field: event.duration
      redis:
        duration_field: event.duration
      kafka:
        duration_field: event.duration
      cassandra:
        duration_field: event.duration
      elasticsearch:
        duration_field: event.duration
storage:
  enabled: true
  backend: sqlite
  path: ./outputs/perfagent.db
  dsn_env: PERFAGENT_DATABASE_URL
  retention_days: 30
dependencies:
  postgres:
    type: postgres
    role: downstream
    criticality: high
    metrics:
      p95_latency_ms: 'pg_query_p95_latency_ms{service="{service}"}'
      connection_pool_utilization_percent: 'pg_connection_pool_utilization_percent{service="{service}"}'
  redis:
    type: redis
    role: downstream
    criticality: medium
    metrics:
      p95_latency_ms: 'redis_command_p95_latency_ms{service="{service}"}'
      memory_utilization_percent: 'redis_memory_utilization_percent{service="{service}"}'
  kafka:
    type: kafka
    role: downstream
    criticality: high
    metrics:
      consumer_lag: 'kafka_consumergroup_lag{service="{service}"}'
output:
  directory: ./outputs/sample-payments-api
